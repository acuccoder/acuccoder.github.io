<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Menu Bar</title>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<style>
    * {
        box-sizing: border-box;
    }
    
    html,
    body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        /* Set menu vertical position */
        align-items: center;
        /* Set menu horizontal position */
        background: rgb(63, 94, 251);
        background: linear-gradient(90deg, rgba(63, 94, 251, 1) 0%, rgba(189, 43, 72, 1) 100%);
    }
    
    .main_container {
        width: 500px;
        height: 80px;
        border: 3px solid rgb(223, 223, 223);
        border-radius: 6px;
        background: rgb(223, 223, 223);
        perspective: 1000px;
        transition: width 1200ms cubic-bezier(0.5, 0, 0, 1.5);
    }
    
    .menu {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: row-reverse;
        justify-content: space-evenly;
        align-items: center;
        transition: 0.2 width 700ms ease;
    }
    
    .menu_element {
        width: 60px;
        height: 60px;
        border-radius: 6px;
        padding: 10px;
        margin: 5px;
        font-size: 1.2em;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI_', Roboto_, Oxygen_, Ubuntu_, Cantarell_, 'Open Sans_', 'Helvetica Neue_', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        transition: box-shadow 200ms cubic-bezier(0.645, 0.045, 0.355, 1);
        cursor: pointer;
        user-select: none;
    }
    
    .menu_element:hover {
        -webkit-box-shadow: -2px 3px 3px 1px rgb(55, 110, 199);
        -moz-box-shadow: -2px 3px 3px 1px rgb(55, 110, 199);
        box-shadow: -2px 3px 3px 1px rgb(55, 110, 199);
    }
    
    .menu_element:active {
        -webkit-box-shadow: -1px 3px 3px -2px rgb(55, 110, 199);
        -moz-box-shadow: -1px 3px 3px -2px rgb(55, 110, 199);
        box-shadow: -1px 3px 3px -2px rgb(55, 110, 199);
    }
    
    .menu_action_button {
        width: 60px;
        height: 60px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    
    .menu_action_button div {
        width: 100%;
        height: 5px;
        margin: 8%;
        padding: 2%;
        border: 1px solid rgb(55, 110, 199);
        border-radius: 25px;
        display: block;
        background: rgb(55, 110, 199);
        transition: transform 1200ms cubic-bezier(0.68, -0.55, 0.265, 1.55);
        transform-origin: 33%;
        -moz-transform-origin: 33%;
    }
    
    @keyframes hide_tray {
        0% {
            transform: translate(0%);
        }
        100% {
            transform: translate(-600%);
            visibility: visible;
        }
    }
    
    @keyframes show_tray {
        0% {
            transform: translate(-600%);
        }
        100% {
            transform: translate(0%);
            visibility: visible;
        }
    }
</style>
<script>
    $(document).ready(() => {
        let isHidden = false;
        $(".menu_action_button").bind("click", () => {
            if (isHidden == false) {
                $(".menu_option").css(
                    "animation",
                    "hide_tray 600ms cubic-bezier(0.645, 0.045, 0.355, 1) forwards"
                );
                $(".main_container").css("width", "80px");
                setTimeout(() => {
                    $(".menu_action_button").css("position", "absolute");
                    $(".menu_action_button div:nth-of-type(2)").css("display", "flex");
                }, 800);
                isHidden = true;
            } else if (isHidden == true) {
                $(".menu_option").css(
                    "animation",
                    "show_tray 600ms cubic-bezier(0.645, 0.045, 0.355, 1) forwards"
                );
                $(".main_container").css("width", "500px");
                $(".menu_action_button").css("position", "relative");
                $(".menu_action_button div:nth-of-type(2)").css("display", "flex");
                isHidden = false;
            }
        });
    });
</script>

<body>
    <div class="main_container">
        <div class="menu">
            <div class="menu_element menu_action_button">
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="menu_element menu_option">smp</div>
            <div class="menu_element menu_option">smp</div>
            <div class="menu_element menu_option">smp</div>
            <div class="menu_element menu_option">smp</div>
            <div class="menu_element menu_option">smp</div>
        </div>
    </div>
</body>

</html>
