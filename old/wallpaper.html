</head>
<style>
body {
    background-color: lightblue;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
kbd {
    background-color: #eee;
    border-radius: 3px;
    border: 1px solid #b4b4b4;
    box-shadow: 0 1px 1px rgba(0, 0, 0, 0.2), 0 2px 0 0 rgba(255, 255, 255, 0.7) inset;
    color: #333;
    display: inline-block;
    font-size: 0.85em;
    font-weight: 700;
    line-height: 1;
    padding: 2px 4px;
    white-space: nowrap;
}

.group1{
    width: 33vw;
    height: 42vh;
  
}
.group2{
    width: 33vw;
    height: 40vh;
}
.group3{
    width: 25vw;
    height: 33vh;
}
.groupheader {
    border: none;
    border-radius: 0;
    margin: 0;
    padding: 3px;
    border-bottom: 3px solid #000000;
    cursor: move;


}
#mydiv {
      position: absolute;
      z-index: 9;
    background-color: #f1f1f1;
    text-align: center;

    border: 5px solid black; /* 5px means 5 pixels and solid means it is a solid border. Black is the colour used. */
    border-radius: 5px; /* Rounded Corners */
    text-align: center; /* Centered text */

}
    
    #mydivheader {
    padding: 10px;
    cursor: move;
    z-index: 10;
    background-color: #c7c7c7;
    color: black;
}

#mydiv2 {
          position: absolute;
          z-index: 9;
        background-color: #f1f1f1;
        text-align: center;

        border: 5px solid black; /* 5px means 5 pixels and solid means it is a solid border. Black is the colour used. */
        border-radius: 5px; /* Rounded Corners */
        text-align: center; /* Centered text */

    }
    
        #mydiv2header {
        padding: 10px;
        cursor: move;
        z-index: 10;
        background-color: #c7c7c7;
        color: black;
    }
    #mydiv3 {
          position: absolute;
          z-index: 9;
        background-color: #f1f1f1;
        border: 5px solid black; /* 5px means 5 pixels and solid means it is a solid border. Black is the colour used. */
        border-radius: 5px; /* Rounded Corners */
        text-align: center; /* Centered text */

    }
    
        #mydiv3header {
        padding: 10px;
        cursor: move;
        z-index: 10;
        background-color: #c7c7c7;
        color: black;
    }

</style>
<body>
<p contenteditable="true">You can use Developer Tools to edit anything you want here. Just press the key chord <kbd>CTRL</kbd> or <kbd>⌘ CMD</kbd> + <kbd>SHIFT</kbd> + <kbd>I</kbd>. Select Background: <input type="file"></p>
    <div id="mydiv" class="group1" contenteditable="true">
        <div id="mydivheader" class="groupheader">Group 1</div>
      </div>   

      <div id="mydiv2" class="group1" contenteditable="true">
        <div id="mydiv2header" class="groupheader">Group 2</div>
      </div>  

      <div id="mydiv3" class="group1" contenteditable="true">
        <div id="mydiv3header" class="groupheader">Group 3</div>
      </div>   
      

    
        <script>
        dragElement(document.getElementById("mydiv"));
        dragElement(document.getElementById("mydiv2"));
        dragElement(document.getElementById("mydiv3"));
    
        function dragElement(elmnt) {
          var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
          if (document.getElementById(elmnt.id + "header")) {

            document.getElementById(elmnt.id + "header").onmousedown = dragMouseDown;
          } else {

            elmnt.onmousedown = dragMouseDown;
          }
    
          function dragMouseDown(e) {
            e = e || window.event;
            e.preventDefault();

            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDragElement;

            document.onmousemove = elementDrag;
          }
    
          function elementDrag(e) {
            e = e || window.event;
            e.preventDefault();

            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;

            elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
            elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
          }
    
          function closeDragElement() {

            document.onmouseup = null;
            document.onmousemove = null;
          }
        }
        
        </script>
</body>

</html>
